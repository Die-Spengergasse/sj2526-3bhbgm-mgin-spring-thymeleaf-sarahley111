<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<h1>Bookmanagment</h1>

<a th:href="@{/books/new}">+ Neues Buch</a>

<table border="1" cellpadding="6">
    <tr>
        <th>ID</th>
        <th>Titel</th>
        <th>Autor</th>
        <th>Jahr</th>
        <th>Aktionen</th>
    </tr>

    <tr th:each="b : ${books}">
        <td th:text="${b.id}"></td>
        <td th:text="${b.title}"></td>
        <td th:text="${b.author}"></td>
        <td th:text="${b.publishYear}"></td>
        <td>
            <a th:href="@{/books/{id}/edit(id=${b.id})}">Bearbeiten</a>

            <form th:action="@{/books/{id}/delete(id=${b.id})}" method="post" style="display:inline;">
                <button type="submit">Löschen</button>
            </form>
        </td>
    </tr>
</table>

</body>
</html>
