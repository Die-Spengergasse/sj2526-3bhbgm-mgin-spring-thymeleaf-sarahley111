<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<h1 th:text="${book.id == null} ? 'Neues Buch' : 'Buch bearbeiten'"></h1>

<form th:action="${book.id == null} ? @{/books} : @{/books/{id}(id=${book.id})}"
      th:object="${book}" method="post">

    Titel: <input type="text" th:field="*{title}" required><br>
    Autor: <input type="text" th:field="*{author}" required><br>
    Jahr: <input type="number" th:field="*{publishYear}">

    <button type="submit">Speichern</button>
</form>

<a th:href="@{/books}">Zurück</a>

</body>
</html>
